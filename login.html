<html>
<head>
<title>Login</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    gap:40px;
}

div{
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    width:250px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-size:14px;
}

input[type="text"],
input[type="password"]{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}

input[type="submit"]{
    width:100%;
    padding:10px;
    border:none;
    background:#667eea;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

input[type="submit"]:hover{
    background:#5563c1;
}

</style>

</head>

<body>

<div>
<h2>User Login</h2>
<form action="login" method="post">

<label>Email</label>
<input type="text" name="email">

<label>Password</label>
<input type="password" name="pass">

<input type="hidden" name="type" value="user">

<input type="submit" value="Login">
<p>create an account? <a href="register.html">Register here</a></p>

</form>
</div>

<div>
<h2>Admin Login</h2>
<form action="login" method="post">

<label>Email</label>
<input type="text" name="email">

<label>Password</label>
<input type="password" name="pass">

<input type="hidden" name="type" value="admin">

<input type="submit" value="Login">
<p>create an account? <a href="register.html">Register here</a></p>

</form>
</div>

</body>
</html>
